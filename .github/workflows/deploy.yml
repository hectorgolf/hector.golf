name: Deploy hector.golf

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]      # Only run when the push is to the "main" branch
    paths:
      - 'astrosite/**/*'          # Only run when the push includes changes to the Astro website
      - '.github/workflows/**/*'  # ...or on Github Actions workflows

  # Runs at 3:30am and 12:30 (UTC) every day, hopefully after
  # the 3:00/12:00 data update has been triggered and finished:
  schedule:
    - cron: "30 3,12 * * *"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow this job to clone the repo and create a page deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. However, do NOT cancel in-progress runs as we
# want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  # Build the Astro site and prepare it for deployment to GitHub Pages.
  # This job will run the build command and upload the built site as an artifact
  # that can be used in the deployment step.
  build:
    runs-on: ubuntu-latest
    environment: production
    steps:
      # Checkout the repository so we can access the Astro project files and
      # build the site.
      - name: Checkout your repository using git
        uses: actions/checkout@v6

      # Set up Github Pages, which will give us the correct base path and
      # origin to use when building the site with `withastro/action`.
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      # Use `withastro/action` to build the site and upload it as an artifact
      # that can be deployed to GitHub Pages.
      - name: Install, build, and upload your site
        uses: withastro/action@v6
        with:
          path: astrosite  # The root location of your Astro project inside the repository. (optional)
          node-version: 24 # The specific version of Node that should be used to build your site. (optional)
          build-cmd: |
            npx --no-install astro build \
              --site "${{ steps.pages.outputs.origin }}" \
              --base "${{ steps.pages.outputs.base_path }}"
        env:
          WISEGOLF_USERNAME: ${{ vars.WISEGOLF_USERNAME }}
          WISEGOLF_PASSWORD: ${{ secrets.WISEGOLF_PASSWORD }}

  # This is the deployment step that takes the built site artifact from the
  # previous step and deploys it to GitHub Pages. This step will only run after
  # the build step has completed successfully.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
